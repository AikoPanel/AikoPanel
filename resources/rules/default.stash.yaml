rule-providers: {ADSG: {behavior: domain, format: yaml, interval: 0, url: 'https://github.com/lonely0811/olsd/raw/main/stash/ADSG.yml'}, ADSVN: {behavior: classical, format: yaml, interval: 0, url: 'https://github.com/lonely0811/olsd/raw/main/stash/ADSVN1.yml'}, ADSVN1: {behavior: classical, format: yaml, interval: 0, url: 'https://github.com/lonely0811/olsd/raw/main/stash/ADSVN2.yml'}}
http:
  mitm:
    - "-redirector*.googlevideo.com"
    - "*.googlevideo.com"
    - "www.youtube.com"
    - "s.youtube.com"
    - "youtubei.googleapis.com"
    - "mobile-api.adguard.org"
  script:
    - match: ^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting)\?
      name: YouTuberesponse
      type: response
      require-body: true
      binary-mode: true
      timeout: 10
    - match: ^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|reel\/reel_watch_sequence)\?
      name: YouTuberequest
      type: request
      require-body: true
      binary-mode: true
      timeout: 10
    - match: ^https?:\/\/mobile-api\.adguard\.org\/api\/.+\/ios_validate_receipt
      name: AdGuard
      type: response
      require-body: true
      timeout: 10
  rewrite:
    - (^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) $1$2$3 302
    - ^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad - reject-200
    - ^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads - reject-200
    - ^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) - reject-200
    - ^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext - reject-200
script-providers:
  YouTuberesponse:
    url: https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/dist/youtube.response.beta.js
    interval: 86400
  YouTuberequest:
    url: https://raw.githubusercontent.com/Maasea/sgmodule/master/Script/Youtube/dist/youtube.request.beta.js
    interval: 86400
  AdGuard:
    url: https://github.com/lonely0811/olsd/raw/main/ad.js
    interval: 86400
proxy-providers:
  VPN:
    interval: 0
    url: $sub_url
